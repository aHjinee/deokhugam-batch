spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/deokhugam_test
    username: user1
    password: 1234
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:schema.sql, classpath:schema_batch.sql
      data-locations: classpath:data.sql

  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.sbproject.deokhugam: debug
    org.hibernate.orm.jdbc.bind: trace
#    org.hibernate.SQL: debug

